<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // Primitive data types in JavaScript:

        let a = "javaScript"; // string
        let b = 2345; // number
        let c = true; // boolean
        let d = null; // null

        // Object data type  stores multiple values as key-value pairs
        let e ={
            "class" : 4,
            "SchoolName": "SriChaitanyaHighSchool",
            "RollNumber": 24,
        };
        // e.section = "B"
        // console.log(e)

        console.log(a,b,c,d,e)

        // Prints the data types
        console.log(typeof a, typeof b, typeof c, typeof d , typeof e)
       
    </script>
</body>
</html>
